      * {
        box-sizing: border-box;
        margin: 0;

      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #8b5cf6;
        --link: #60a5fa;
      }
      [data-theme="light"] {
        --bg: #f8fafc;
        --surface: #fff;
        --border: #e2e8f0;
        --text: #1e293b;
        --muted: #64748b;
        --link: #3b82f6;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .topbar a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: color 0.2s;
      }
      .topbar a:hover {
        color: var(--accent);
      }
      .brand {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--text);
      }
      .brand span {
        color: var(--accent);
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn {
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .toolbar {
        padding: 0.4rem 1rem;
        display: flex;
        gap: 0.3rem;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .tool {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        transition: all 0.15s;
      }
      .tool:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(139, 92, 246, 0.1);
      }
      .main {
        flex: 1;

        grid-template-columns: 1fr;
        gap: 0;
      }
      @media (min-width: 768px) {
        .main {
          grid-template-columns: 1fr 1fr;

      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 300px;

      .panel-header {
        padding: 0.6rem 1rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        font-size: 0.8rem;
        font-weight: 600;

        gap: 0.5rem;

      .panel-header .dot {

        height: 8px;
        border-radius: 50%;
      }
      #editor {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: none;
        padding: 1rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        resize: none;
        outline: none;
        border-right: 1px solid var(--border);
      }
      #preview {
        flex: 1;
        padding: 1.5rem 2rem;
        overflow: auto;
        line-height: 1.7;
        background: var(--bg);
      }
      #preview h1 {
        font-size: 2rem;

        margin: 1.5rem 0 0.5rem;
        border-bottom: 2px solid var(--border);
        padding-bottom: 0.3rem;
      }
      #preview h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 1.2rem 0 0.4rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.2rem;
      }
      #preview h3 {
        font-size: 1.2rem;
        font-weight: 600;
        margin: 1rem 0 0.3rem;
      }
      #preview p {
        margin: 0.8rem 0;
      }
      #preview code {
        background: var(--surface);
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85em;
        color: var(--accent);
      }
      #preview pre {

        padding: 1rem;

        overflow: auto;
        margin: 0.8rem 0;
      }
      #preview pre code {

      #preview blockquote {

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const editor = document.getElementById("editor");
      const preview = document.getElementById("preview");
      const stats = document.getElementById("stats");

      marked.setOptions({ breaks: true, gfm: true });

      function render() {
        preview.innerHTML = marked.parse(editor.value);
        const text = editor.value;
        const words = text
          .trim()
          .split(/\s+/)
          .filter((w) => w).length;
        const chars = text.length;
        const lines = text.split("\n").length;
        stats.textContent = `${words} parole • ${chars} caratteri • ${lines} righe`;
      }

      editor.addEventListener("input", render);
      render();

      function ins(before, after) {
        const s = editor.selectionStart,
          e = editor.selectionEnd;
        const sel = editor.value.substring(s, e) || "testo";
        editor.value =
          editor.value.substring(0, s) +
          before +
          sel +
          after +
          editor.value.substring(e);
        editor.selectionStart = s + before.length;
        editor.selectionEnd = s + before.length + sel.length;
        editor.focus();
        render();
      }

      function insLine(prefix) {
        const s = editor.selectionStart;
        const lineStart = editor.value.lastIndexOf("\n", s - 1) + 1;
        editor.value =
          editor.value.substring(0, lineStart) +
          prefix +
          editor.value.substring(lineStart);
        editor.selectionStart = editor.selectionEnd = s + prefix.length;
        editor.focus();
        render();
      }

      function insTable() {
        ins(
          "| Col 1 | Col 2 | Col 3 |\n|-------|-------|-------|\n| ",
          " | | |\n",
        );
      }

      function exportHTML() {
        const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Markdown Export</title><style>body{font-family:system-ui;max-width:800px;margin:2rem auto;padding:0 1rem;line-height:1.6}code{background:#f1f5f9;padding:.15rem .4rem;border-radius:4px}pre{background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:8px;overflow:auto}table{border-collapse:collapse;width:100%}th,td{border:1px solid #e2e8f0;padding:.5rem}th{background:#f1f5f9}</style></head><body>${marked.parse(editor.value)}</body></html>`;
        const blob = new Blob([html], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "document.html";
        a.click();
      }

      function copyHTML() {
        navigator.clipboard.writeText(marked.parse(editor.value)).then(() => {
          const btn = document.querySelector('[onclick="copyHTML()"]');
          btn.innerHTML = '<i class="bi bi-check2"></i> Copiato!';
          setTimeout(
            () => (btn.innerHTML = '<i class="bi bi-clipboard"></i> Copia'),
            2000,
          );
        });
      }

      editor.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const s = e.target.selectionStart;
          e.target.value =
            e.target.value.substring(0, s) +
            "  " +
            e.target.value.substring(e.target.selectionEnd);
          e.target.selectionStart = e.target.selectionEnd = s + 2;
          render();
        }
      });

      function toggleTheme() {
        const html = document.documentElement;
        const next =
          html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.getElementById("themeIcon").className =
          next === "dark" ? "bi bi-sun-fill" : "bi bi-moon-stars-fill";
        localStorage.setItem("demo_theme", next);
      }
      (() => {
        const s = localStorage.getItem("demo_theme");
        if (s) {
          document.documentElement.setAttribute("data-theme", s);
          document.getElementById("themeIcon").className =
            s === "dark" ? "bi bi-sun-fill" : "bi bi-moon-stars-fill";
        }
      })();
    </script>
